services:
  mysql:
    image: mysql:8.4
    container_name: mmmail-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mmmail
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mmmail-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    container_name: mmmail-redis
    restart: unless-stopped
    environment:
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${SPRING_REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - mmmail-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$SPRING_REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  nacos:
    image: nacos/nacos-server:v2.4.2
    container_name: mmmail-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
    ports:
      - "127.0.0.1:8848:8848"
    volumes:
      - mmmail-nacos-data:/home/nacos/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mmmail-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      SPRING_DATASOURCE_DRIVER: ${SPRING_DATASOURCE_DRIVER}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mmmail?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      SPRING_REDIS_DATABASE: ${SPRING_REDIS_DATABASE}
      SPRING_REDIS_TIMEOUT: ${SPRING_REDIS_TIMEOUT}
      MMMAIL_NACOS_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE}
      NACOS_GROUP: ${NACOS_GROUP}
      MMMAIL_JWT_SECRET: ${MMMAIL_JWT_SECRET:-}
      MMMAIL_JWT_SECRET_FILE: ${MMMAIL_JWT_SECRET_FILE:-}
      MMMAIL_BILLING_WEBHOOK_SECRET: ${MMMAIL_BILLING_WEBHOOK_SECRET:-}
      MMMAIL_LICENSE_PUBLIC_KEY: ${MMMAIL_LICENSE_PUBLIC_KEY:-}
      MMMAIL_AUTH_CSRF_COOKIE_NAME: ${MMMAIL_AUTH_CSRF_COOKIE_NAME}
      MMMAIL_AUTH_REFRESH_COOKIE_NAME: ${MMMAIL_AUTH_REFRESH_COOKIE_NAME}
      MMMAIL_PUBLIC_BASE_URL: http://localhost:3001
      MMMAIL_CORS_ALLOWED_ORIGINS: http://localhost:3001,http://127.0.0.1:3001
      MMMAIL_DRIVE_STORAGE_ROOT: /var/lib/mmmail/drive
      MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_WINDOW_SECONDS: ${MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_WINDOW_SECONDS}
      MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_MAX_EVENTS: ${MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_MAX_EVENTS}
      MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_WINDOW_SECONDS: ${MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_WINDOW_SECONDS}
      MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_MAX_EVENTS: ${MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_MAX_EVENTS}
      MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_WINDOW_SECONDS: ${MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_WINDOW_SECONDS}
      MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_MAX_EVENTS: ${MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_MAX_EVENTS}
      MMMAIL_WEBSOCKET_AFFINITY_COOKIE_NAME: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_NAME}
      MMMAIL_WEBSOCKET_AFFINITY_NODE_ID: ${MMMAIL_WEBSOCKET_AFFINITY_NODE_ID}
      MMMAIL_WEBSOCKET_AFFINITY_COOKIE_SECURE: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_SECURE}
      MMMAIL_WEBSOCKET_AFFINITY_COOKIE_MAX_AGE_SECONDS: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_MAX_AGE_SECONDS}
      MMMAIL_WEBSOCKET_SESSION_MAX_IDLE_MS: ${MMMAIL_WEBSOCKET_SESSION_MAX_IDLE_MS}
      MMMAIL_WEBSOCKET_CONNECTION_MAX_ACTIVE: ${MMMAIL_WEBSOCKET_CONNECTION_MAX_ACTIVE}
      MMMAIL_WEBSOCKET_CONNECTION_RETRY_AFTER_MS: ${MMMAIL_WEBSOCKET_CONNECTION_RETRY_AFTER_MS}
      MMMAIL_WEBSOCKET_SUBSCRIPTION_MAX_CHANNELS_PER_SESSION: ${MMMAIL_WEBSOCKET_SUBSCRIPTION_MAX_CHANNELS_PER_SESSION}
      MMMAIL_WEBSOCKET_SUBSCRIPTION_RETRY_AFTER_MS: ${MMMAIL_WEBSOCKET_SUBSCRIPTION_RETRY_AFTER_MS}
      MMMAIL_WEBSOCKET_RATE_LIMIT_WINDOW_SECONDS: ${MMMAIL_WEBSOCKET_RATE_LIMIT_WINDOW_SECONDS}
      MMMAIL_WEBSOCKET_RATE_LIMIT_MAX_MESSAGES_PER_WINDOW: ${MMMAIL_WEBSOCKET_RATE_LIMIT_MAX_MESSAGES_PER_WINDOW}
      MMMAIL_WEBSOCKET_RATE_LIMIT_RETRY_AFTER_MS: ${MMMAIL_WEBSOCKET_RATE_LIMIT_RETRY_AFTER_MS}
      MMMAIL_MAIL_EXTERNAL_ACCOUNT_SECRET: ${MMMAIL_MAIL_EXTERNAL_ACCOUNT_SECRET:-}
      MMMAIL_WEB_PUSH_VAPID_SUBJECT: ${MMMAIL_WEB_PUSH_VAPID_SUBJECT:-}
      MMMAIL_WEB_PUSH_VAPID_PUBLIC_KEY: ${MMMAIL_WEB_PUSH_VAPID_PUBLIC_KEY:-}
      MMMAIL_WEB_PUSH_VAPID_PRIVATE_KEY: ${MMMAIL_WEB_PUSH_VAPID_PRIVATE_KEY:-}
      MMMAIL_FEATURE_FLAGS_WATCH_INTERVAL_MS: ${MMMAIL_FEATURE_FLAGS_WATCH_INTERVAL_MS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - mmmail-drive-data:/var/lib/mmmail/drive
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: mmmail-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3001 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12

volumes:
  mmmail-mysql-data:
  mmmail-redis-data:
  mmmail-nacos-data:
  mmmail-drive-data:
