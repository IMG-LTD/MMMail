version: 1
scope: mmmail-v2.2-dsr
rules:
  - Every Flyway/schema table must have owner, retention, subjectRef, export, and delete metadata.
  - subjectRef uses "<column>:<identity>" or "none"; identity values are user_id, email, org_id, operational, or aggregate.
  - delete is the approved DSR erasure behavior; retain requires a legal/security retention reason.
