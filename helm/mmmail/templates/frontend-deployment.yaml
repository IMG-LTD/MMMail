apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mmmail.frontendName" . }}
  labels:
    {{- include "mmmail.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend-admin
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "mmmail.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.frontend.podAnnotations | nindent 8 }}
      labels:
        {{- include "mmmail.frontendSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend-admin
          image: "{{ .Values.frontend.image.repository }}:{{ default .Chart.AppVersion .Values.frontend.image.tag }}"
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
          env:
            - name: VITE_API_BASE_URL
              value: {{ .Values.frontend.apiBaseUrl | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
