apiVersion: v1
kind: Service
metadata:
  name: {{ include "mmmail.backendName" . }}
  labels:
    {{- include "mmmail.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
  selector:
    {{- include "mmmail.backendSelectorLabels" . | nindent 4 }}
