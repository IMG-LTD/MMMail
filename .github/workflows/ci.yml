name: MMMail CI

on:
  push:
    branches: ["dev/v*", "main", "release/v*", "release/2.0.0"]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend-v2/pnpm-lock.yaml
            frontend-admin/pnpm-lock.yaml

      - name: Root v2.1.2 contract gates
        run: node --test tests/*.test.mjs

      - name: Install frontend-admin deps
        run: pnpm --dir frontend-admin install --frozen-lockfile

      - name: Soybean API type generation guard
        run: |
          MMMAIL_OPENAPI_SOURCE=../contracts/openapi/v21-api-catalog.yaml pnpm --dir frontend-admin gen:api
          git diff --exit-code -- frontend-admin/src/service/api/__generated__

      - name: Soybean v2.1.2 contract and bundle budget gates
        run: |
          pnpm --dir frontend-admin test:v212
          pnpm --dir frontend-admin test:e2e
          pnpm --dir frontend-admin check:style-discipline
          pnpm --dir frontend-admin check:i18n
          pnpm --dir frontend-admin check:bundle-budget
          pnpm --dir frontend-admin test:lighthouse

      - name: Soybean v2.1.2 coverage gates
        run: pnpm --dir frontend-admin test:coverage

      - name: Install frontend-v2 deps
        run: pnpm --dir frontend-v2 install --frozen-lockfile

      - name: Frontend-v2 tests
        run: pnpm --dir frontend-v2 test

      - name: Frontend-v2 contract regression
        run: >
          pnpm --dir frontend-v2 exec node --test
          tests/foundation-route-contract.test.mjs
          tests/redirect-contract.test.mjs
          tests/auth-scope-contract.test.mjs
          tests/public-share-contract.test.mjs
          tests/public-share-runtime-contract.test.mjs
          tests/public-share-view-contract.test.mjs
          tests/mail-workspace-contract.test.mjs
          tests/calendar-workspace-contract.test.mjs
          tests/drive-workspace-contract.test.mjs
          tests/pass-workspace-contract.test.mjs
          tests/docs-sheets-runtime-contract.test.mjs
          tests/workspace-aggregation-contract.test.mjs
          tests/settings-panel-contract.test.mjs
          tests/system-health-contract.test.mjs
          tests/command-center-query-contract.test.mjs

      - name: Frontend-v2 typecheck
        run: pnpm --dir frontend-v2 typecheck

      - name: Frontend-v2 coverage gates
        run: pnpm --dir frontend-v2 test:coverage

      - name: Frontend-v2 audit (high)
        run: pnpm --dir frontend-v2 audit --prod --audit-level=high --ignore-registry-errors

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Backend auth/rbac and v2 contract regression
        run: >
          mvn -f backend/pom.xml -pl mmmail-server -am
          -Dtest=AuthFlowIntegrationTest,OrgAuthenticationSecurityIntegrationTest,OrgAdminConsoleIntegrationTest,OrgMemberGovernanceIntegrationTest,PlatformCapabilityIntegrationTest,PublicShareCapabilityIntegrationTest,WorkspaceAggregationIntegrationTest,AiMcpCapabilityIntegrationTest,RequestHeaderContractIntegrationTest,ObservabilityIntegrationTest,PrometheusEndpointRuntimeTest,BillingReadinessIntegrationTest,ContractCatalogRegressionTest,TenantScopeFoundationContractTest,BackendModuleExtractionContractTest,PublicShareTokenHashMigrationIntegrationTest,MailPublicShareTokenHashContractTest,PassPublicShareTokenHashContractTest,DrivePublicShareTokenHashContractTest
          -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Backend v2.1 runtime regression
        run: >
          mvn -f backend/pom.xml -pl mmmail-server -am
          -Dtest=BackendV21AccessEntitlementGatesTest,BackendV21ApiContractCatalogTest,BackendV21BackgroundJobFoundationTest,BackendV21CalendarRuntimeBridgeTest,BackendV21CollaborationWriteRuntimeTest,BackendV21CommunityRuntimeClosureTest,BackendV21DocsSheetsRuntimeBridgeTest,BackendV21DriveRuntimeBridgeTest,BackendV21EventOutboxFoundationTest,BackendV21MailRuntimeBridgeTest,BackendV21OpsRuntimeBridgeTest,BackendV21PassRuntimeBridgeTest,BackendV21RuntimeContractGapClosureTest
          -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Backend v2.1.2 runtime regression
        run: >
          mvn -f backend/pom.xml -pl mmmail-server -am
          -Dtest=*V212*Test,*V212*IntegrationTest,DevSeedV212ContractTest,DevSeedV212StartupIntegrationTest,ApiSpecV212ErrorCodeContractTest,AuditV212ContractTest,FlywayMigrationVersionUniquenessTest,V21CollaborationBoardRanksTest,WebSocketMetricsServiceTest,WebSocketHandshakeFailureContractTest,SuiteNotificationSyncWebSocketReplayTest,RequestObservationServiceTest,RequestRouteModuleResolverTest,WebSocketLoadTestScriptContractTest,WebSocketIdleTimeoutConfigTest
          -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Backend coverage seed tests
        run: |
          rm -f backend/mmmail-server/target/jacoco.exec
          mvn -f backend/pom.xml -pl mmmail-server -am \
            -Dtest=WebSocketMetricsServiceTest,WebSocketChannelLimitServiceTest,WebSocketConnectionLimitServiceTest,WebSocketThrottleServiceTest \
            -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Backend coverage gate
        run: >
          mvn -f backend/pom.xml -pl mmmail-server -am
          -DskipTests verify

  validate:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      MMMAIL_VALIDATE_CONTAINER_TESTS: "true"
      MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN: "true"
      MMMAIL_DEPENDENCY_SCAN_TIMEOUT_SECONDS: "1800"
      MMMAIL_NVD_API_KEY: ${{ secrets.MMMAIL_NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI secrets
        run: |
          if [[ -z "${MMMAIL_NVD_API_KEY}" ]]; then
            echo "::error::Missing required secret MMMAIL_NVD_API_KEY. The validate job runs OWASP dependency-check with MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN=true, and the initial NVD bootstrap exceeds the CI timeout without an API key."
            echo "::error::Add repository or organization secret MMMAIL_NVD_API_KEY, then re-run the validate job."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend-v2/pnpm-lock.yaml

      - name: Install frontend-v2 deps
        run: pnpm --dir frontend-v2 install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Restore dependency-check data
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: .tools/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Validate CI gates
        run: bash scripts/validate-ci.sh

      - name: Collect validation logs
        if: always()
        run: |
          mkdir -p artifacts/ci-logs
          shopt -s nullglob
          for file in /tmp/mmmail-*.log; do
            cp "$file" artifacts/ci-logs/
          done

      - name: Save dependency-check data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .tools/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Publish gate summary
        if: always()
        run: |
          {
            echo "## MMMail CI gate summary"
            echo "- validate-ci entry: \`bash scripts/validate-ci.sh\`"
            echo "- container-backed migration gates: \`bash scripts/validate-local.sh\` includes \`bash scripts/validate-batch3.sh\`"
            echo "- dependency scan: \`MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN=true\` + required secret \`MMMAIL_NVD_API_KEY\`"
            echo "- security reports: \`artifacts/security/dependency-check/\`"
            echo "- batch3 validation log artifact: \`artifacts/ci-logs/mmmail-batch3-validate.log\`"
            echo "- CI logs: \`artifacts/ci-logs/\`"
            echo "- surefire reports: \`backend/mmmail-server/target/surefire-reports/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mmmail-validate-artifacts
          if-no-files-found: warn
          path: |
            artifacts/
            backend/mmmail-server/target/surefire-reports/

  docker-test-baseline:
    runs-on: ubuntu-latest
    name: Docker test baseline (v2.1.3 release-gate)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend-admin/pnpm-lock.yaml

      - name: Install frontend-admin deps
        run: pnpm --dir frontend-admin install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify docker access
        run: bash scripts/check-docker-group.sh

      - name: Run docker-backed e2e baseline
        run: bash scripts/run-tests-docker.sh e2e

      - name: Tear down stack
        if: always()
        run: bash scripts/run-tests-docker.sh e2e --teardown-only

  release-gate:
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-test-baseline]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend-v2/pnpm-lock.yaml
            frontend-admin/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend-v2 deps
        run: pnpm --dir frontend-v2 install --frozen-lockfile

      - name: Install frontend-admin deps
        run: pnpm --dir frontend-admin install --frozen-lockfile

      - name: Run unified release gate
        run: bash scripts/release-gate.sh --skip 1,5,8
