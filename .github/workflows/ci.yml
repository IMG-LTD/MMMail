name: MMMail CI

on:
  push:
    branches: ["dev/v*", "main", "release/v*", "release/2.0.0"]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install frontend-v2 deps
        run: pnpm --dir frontend-v2 install --frozen-lockfile

      - name: Frontend i18n gates
        run: pnpm --dir frontend i18n:check

      - name: Publish frontend i18n summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const summaryPath = process.env.GITHUB_STEP_SUMMARY
          const catalogPath = 'artifacts/i18n-consistency-report.json'
          const coveragePath = 'artifacts/i18n-page-coverage-report.json'
          const surfacePath = 'artifacts/i18n-surface-literal-report.json'
          const lines = ['## Frontend i18n gates']
          if (!summaryPath) {
            process.exit(0)
          }
          if (!fs.existsSync(catalogPath) || !fs.existsSync(coveragePath) || !fs.existsSync(surfacePath)) {
            lines.push('- i18n report artifacts unavailable')
            fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
            process.exit(0)
          }
          const catalog = JSON.parse(fs.readFileSync(catalogPath, 'utf8'))
          const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'))
          const surface = JSON.parse(fs.readFileSync(surfacePath, 'utf8'))
          lines.push(`- modules: \`${catalog.totalModules}\``)
          lines.push(`- locale key gaps: \`${catalog.modulesWithGaps.length}\``)
          lines.push(`- placeholder mismatches: \`${catalog.modulesWithPlaceholderMismatches.length}\``)
          lines.push(`- surface literal files: \`${surface.filesWithFindings.length}\``)
          lines.push(`- surface literal findings: \`${surface.totalFindings}\``)
          lines.push(`- page coverage: \`${coverage.coveragePercent}%\``)
          lines.push(`- pages without i18n: \`${coverage.pagesWithoutI18n.length}\``)
          lines.push(`- pages without static keys: \`${coverage.pagesWithoutStaticKeys.length}\``)
          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
          NODE

      - name: Frontend tests
        run: pnpm --dir frontend test

      - name: Frontend v2 tests
        run: pnpm --dir frontend-v2 test

      - name: Frontend-v2 contract regression
        run: >
          pnpm --dir frontend-v2 exec node --test
          tests/foundation-route-contract.test.mjs
          tests/redirect-contract.test.mjs
          tests/auth-scope-contract.test.mjs
          tests/public-share-contract.test.mjs
          tests/public-share-runtime-contract.test.mjs
          tests/public-share-view-contract.test.mjs
          tests/mail-workspace-contract.test.mjs
          tests/calendar-workspace-contract.test.mjs
          tests/drive-workspace-contract.test.mjs
          tests/pass-workspace-contract.test.mjs
          tests/docs-sheets-runtime-contract.test.mjs
          tests/workspace-aggregation-contract.test.mjs
          tests/settings-panel-contract.test.mjs
          tests/system-health-contract.test.mjs
          tests/command-center-query-contract.test.mjs

      - name: Frontend typecheck
        run: pnpm --dir frontend typecheck

      - name: Frontend v2 typecheck
        run: pnpm --dir frontend-v2 typecheck

      - name: Frontend audit (high)
        run: pnpm --dir frontend audit --prod --audit-level=high --ignore-registry-errors

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Backend auth/rbac and v2 contract regression
        run: >
          mvn -f backend/pom.xml -pl mmmail-server -am
          -Dtest=AuthFlowIntegrationTest,OrgAuthenticationSecurityIntegrationTest,OrgAdminConsoleIntegrationTest,OrgMemberGovernanceIntegrationTest,PlatformCapabilityIntegrationTest,PublicShareCapabilityIntegrationTest,WorkspaceAggregationIntegrationTest,AiMcpCapabilityIntegrationTest,RequestHeaderContractIntegrationTest,ObservabilityIntegrationTest,BillingReadinessIntegrationTest,ContractCatalogRegressionTest,TenantScopeFoundationContractTest,BackendModuleExtractionContractTest,PublicShareTokenHashMigrationIntegrationTest,MailPublicShareTokenHashContractTest,PassPublicShareTokenHashContractTest,DrivePublicShareTokenHashContractTest
          -Dsurefire.failIfNoSpecifiedTests=false test

  validate:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      MMMAIL_VALIDATE_CONTAINER_TESTS: "true"
      MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN: "true"
      MMMAIL_NVD_API_KEY: ${{ secrets.MMMAIL_NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI secrets
        run: |
          if [[ -z "${MMMAIL_NVD_API_KEY}" ]]; then
            echo "::error::Missing required secret MMMAIL_NVD_API_KEY. The validate job runs OWASP dependency-check with MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN=true, and the initial NVD bootstrap exceeds the CI timeout without an API key."
            echo "::error::Add repository or organization secret MMMAIL_NVD_API_KEY, then re-run the validate job."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install frontend-v2 deps
        run: pnpm --dir frontend-v2 install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Restore dependency-check data
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: .tools/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Validate CI gates
        run: bash scripts/validate-ci.sh

      - name: Collect validation logs
        if: always()
        run: |
          mkdir -p artifacts/ci-logs
          shopt -s nullglob
          for file in /tmp/mmmail-*.log; do
            cp "$file" artifacts/ci-logs/
          done

      - name: Save dependency-check data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .tools/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Publish gate summary
        if: always()
        run: |
          {
            echo "## MMMail CI gate summary"
            echo "- validate-ci entry: \`bash scripts/validate-ci.sh\`"
            echo "- container-backed migration gates: \`bash scripts/validate-local.sh\` includes \`bash scripts/validate-batch3.sh\`"
            echo "- dependency scan: \`MMMAIL_RUN_BACKEND_DEPENDENCY_SCAN=true\` + required secret \`MMMAIL_NVD_API_KEY\`"
            echo "- security reports: \`artifacts/security/dependency-check/\`"
            echo "- batch3 validation log artifact: \`artifacts/ci-logs/mmmail-batch3-validate.log\`"
            echo "- CI logs: \`artifacts/ci-logs/\`"
            echo "- surefire reports: \`backend/mmmail-server/target/surefire-reports/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mmmail-validate-artifacts
          if-no-files-found: warn
          path: |
            artifacts/
            backend/mmmail-server/target/surefire-reports/
