name: DCO

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Signed-off-by
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            const signedOffBy = /^Signed-off-by:\s+.+\s+<.+@.+>$/im;
            const missing = commits.filter(commit => !signedOffBy.test(commit.commit.message));
            for (const commit of missing) {
              core.error(`Commit ${commit.sha} is missing a Signed-off-by trailer`);
            }
            if (missing.length > 0) {
              core.setFailed(`${missing.length} commit(s) are missing Signed-off-by trailers`);
            }
