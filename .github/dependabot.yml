version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/frontend-admin"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    # Legacy frontend-v2 stays on dependency alerts only until contract archival.
    directory: "/frontend-v2"
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
