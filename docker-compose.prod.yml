version: '3.8'

services:
  # MySQL数据库 - 生产环境
  mysql:
    image: mysql:8.0
    container_name: mmmail-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./docker/mysql/conf:/etc/mysql/conf.d
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - mmmail-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis缓存 - 生产环境
  redis:
    image: redis:7.2-alpine
    container_name: mmmail-redis-prod
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_prod:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - mmmail-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 后端服务 - 生产环境
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: mmmail-backend-prod
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-1024}:1024"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1g -Xms512m}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - mysql
      - redis
    volumes:
      - ./logs:/app/logs
      - ./docker/backend/application-docker.yaml:/app/config/application-docker.yaml
      - ./uploads:/app/uploads
    networks:
      - mmmail-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 前端服务 - 生产环境
  frontend:
    build:
      context: ./m-admin-web
      dockerfile: ../docker/frontend/Dockerfile
    container_name: mmmail-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mmmail-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx反向代理 - 生产环境
  nginx:
    image: nginx:alpine
    container_name: mmmail-nginx-prod
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - mmmail-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 监控服务 - 生产环境 (可选)
  watchtower:
    image: containrrr/watchtower
    container_name: mmmail-watchtower-prod
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
    command: --interval 3600
    networks:
      - mmmail-network-prod

volumes:
  mysql_data_prod:
  redis_data_prod:

networks:
  mmmail-network-prod:
    driver: bridge
