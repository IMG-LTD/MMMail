server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring:
  application:
    name: ${OTEL_SERVICE_NAME:mmmail-server}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mmmail?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:mmmail_app}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:127.0.0.1}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      database: ${SPRING_REDIS_DATABASE:0}
      timeout: ${SPRING_REDIS_TIMEOUT:5s}
  cloud:
    discovery:
      enabled: ${MMMAIL_NACOS_ENABLED:true}
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${MMMAIL_NACOS_ENABLED:true}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${MMMAIL_NACOS_ENABLED:true}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    enabled: ${MMMAIL_OTEL_ENABLED:false}
    sampling:
      probability: ${MMMAIL_OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  structured:
    format:
      console: logstash

mmmail:
  runtime:
    nacos-enabled: ${MMMAIL_NACOS_ENABLED:true}
  observability:
    app-version: ${MMMAIL_APP_VERSION:0.1.0-SNAPSHOT}
  feature-flags:
    watch-interval-ms: ${MMMAIL_FEATURE_FLAGS_WATCH_INTERVAL_MS:5000}
  jwt-secret: ${MMMAIL_JWT_SECRET:}
  jwt-secret-file: ${MMMAIL_JWT_SECRET_FILE:}
  cors-allowed-origins: ${MMMAIL_CORS_ALLOWED_ORIGINS}
  jwt-expire-minutes: ${MMMAIL_JWT_EXPIRE_MINUTES:15}
  refresh-token-expire-hours: ${MMMAIL_REFRESH_TOKEN_EXPIRE_HOURS:168}
  auth:
    refresh-cookie-name: ${MMMAIL_AUTH_REFRESH_COOKIE_NAME:MMMAIL_REFRESH_TOKEN}
    csrf-cookie-name: ${MMMAIL_AUTH_CSRF_COOKIE_NAME:MMMAIL_CSRF_TOKEN}
    cookie-secure: ${MMMAIL_AUTH_COOKIE_SECURE:true}
    cookie-same-site: ${MMMAIL_AUTH_COOKIE_SAME_SITE:Lax}
  billing:
    webhook:
      secret: ${MMMAIL_BILLING_WEBHOOK_SECRET:}
  license:
    public-key: ${MMMAIL_LICENSE_PUBLIC_KEY:}
  oidc:
    enabled: ${MMMAIL_OIDC_ENABLED:false}
    callback-path: ${MMMAIL_OIDC_CALLBACK_PATH:/api/v2/auth/oidc/callback}
    client-secret: ${MMMAIL_OIDC_CLIENT_SECRET:}
  security:
    rate-limit:
      login:
        window-seconds: ${MMMAIL_SECURITY_LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
        max-attempts: ${MMMAIL_SECURITY_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
      client-errors:
        window-seconds: ${MMMAIL_SECURITY_CLIENT_ERROR_RATE_LIMIT_WINDOW_SECONDS:60}
        max-events: ${MMMAIL_SECURITY_CLIENT_ERROR_RATE_LIMIT_MAX_EVENTS:30}
      mail-send:
        window-seconds: ${MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_WINDOW_SECONDS:60}
        max-events: ${MMMAIL_SECURITY_MAIL_SEND_RATE_LIMIT_MAX_EVENTS:30}
      web-push-test:
        window-seconds: ${MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_WINDOW_SECONDS:60}
        max-events: ${MMMAIL_SECURITY_WEB_PUSH_TEST_RATE_LIMIT_MAX_EVENTS:5}
      command-run:
        window-seconds: ${MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_WINDOW_SECONDS:60}
        max-events: ${MMMAIL_SECURITY_COMMAND_RUN_RATE_LIMIT_MAX_EVENTS:10}
  websocket:
    affinity:
      cookie-name: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_NAME:WS_AFFINITY}
      node-id: ${MMMAIL_WEBSOCKET_AFFINITY_NODE_ID:mmmail-server}
      cookie-secure: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_SECURE:true}
      cookie-max-age-seconds: ${MMMAIL_WEBSOCKET_AFFINITY_COOKIE_MAX_AGE_SECONDS:604800}
    session:
      max-idle-ms: ${MMMAIL_WEBSOCKET_SESSION_MAX_IDLE_MS:300000}
    connection:
      max-active: ${MMMAIL_WEBSOCKET_CONNECTION_MAX_ACTIVE:10000}
      retry-after-ms: ${MMMAIL_WEBSOCKET_CONNECTION_RETRY_AFTER_MS:1000}
    subscription:
      max-channels-per-session: ${MMMAIL_WEBSOCKET_SUBSCRIPTION_MAX_CHANNELS_PER_SESSION:32}
      retry-after-ms: ${MMMAIL_WEBSOCKET_SUBSCRIPTION_RETRY_AFTER_MS:1000}
    rate-limit:
      window-seconds: ${MMMAIL_WEBSOCKET_RATE_LIMIT_WINDOW_SECONDS:1}
      max-messages-per-window: ${MMMAIL_WEBSOCKET_RATE_LIMIT_MAX_MESSAGES_PER_WINDOW:100}
      retry-after-ms: ${MMMAIL_WEBSOCKET_RATE_LIMIT_RETRY_AFTER_MS:1000}
  drive:
    storage-root: ${MMMAIL_DRIVE_STORAGE_ROOT:${java.io.tmpdir}/mmmail-drive}
    recycle-bin:
      retention-days: ${MMMAIL_DRIVE_RECYCLE_BIN_RETENTION_DAYS:30}
    preview-text-max-bytes: ${MMMAIL_DRIVE_PREVIEW_TEXT_MAX_BYTES:262144}
    public-share-rate-limit:
      window-seconds: ${MMMAIL_DRIVE_PUBLIC_SHARE_RATE_LIMIT_WINDOW_SECONDS:60}
      max-requests: ${MMMAIL_DRIVE_PUBLIC_SHARE_RATE_LIMIT_MAX_REQUESTS:30}
      redis-key-prefix: ${MMMAIL_DRIVE_PUBLIC_SHARE_RATE_LIMIT_REDIS_KEY_PREFIX:mmmail:drive:share-rate}
  mail:
    attachment:
      storage-root: ${MMMAIL_MAIL_ATTACHMENT_STORAGE_ROOT:${java.io.tmpdir}/mmmail-mail-attachments}
    external-account-secret: ${MMMAIL_MAIL_EXTERNAL_ACCOUNT_SECRET:}
  web-push:
    vapid-subject: ${MMMAIL_WEB_PUSH_VAPID_SUBJECT:}
    vapid-public-key: ${MMMAIL_WEB_PUSH_VAPID_PUBLIC_KEY:}
    vapid-private-key: ${MMMAIL_WEB_PUSH_VAPID_PRIVATE_KEY:}
  smtp-outbound:
    enabled: ${MMMAIL_SMTP_OUTBOUND_ENABLED:false}
    host: ${MMMAIL_SMTP_OUTBOUND_HOST:}
    port: ${MMMAIL_SMTP_OUTBOUND_PORT:587}
    username: ${MMMAIL_SMTP_OUTBOUND_USERNAME:}
    password: ${MMMAIL_SMTP_OUTBOUND_PASSWORD:}
    protocol: ${MMMAIL_SMTP_OUTBOUND_PROTOCOL:smtp}
    starttls-enabled: ${MMMAIL_SMTP_OUTBOUND_STARTTLS_ENABLED:true}
    ssl-enabled: ${MMMAIL_SMTP_OUTBOUND_SSL_ENABLED:false}
    connect-timeout-ms: ${MMMAIL_SMTP_OUTBOUND_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${MMMAIL_SMTP_OUTBOUND_READ_TIMEOUT_MS:10000}
    write-timeout-ms: ${MMMAIL_SMTP_OUTBOUND_WRITE_TIMEOUT_MS:10000}
